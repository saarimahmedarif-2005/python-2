{% extends "base.html" %}

{% block title %}Add Grade - Student Progress Tracker{% endblock %}

{% block content %}
<a href="{{ url_for('view_students') }}" class="back-link">← Back to Students</a>

<h1 class="page-title">Add Grade</h1>

<div class="card">
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="student_id">Student:</label>
            <select id="student_id" name="student_id" required>
                <option value="">Select a student...</option>
                {% for sid, name in students.items() %}
                    <option value="{{ sid }}">{{ name }} ({{ sid }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required placeholder="e.g., Maths">
        </div>

        <div class="form-group">
            <label for="mark">Mark (0-100):</label>
            <input type="number" id="mark" name="mark" min="0" max="100" step="0.1" required placeholder="e.g., 85">
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="button btn-success">Add Grade</button>
            <a href="{{ url_for('view_students') }}" class="button btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
