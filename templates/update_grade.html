{% extends "base.html" %}

{% block title %}Update Grade - Student Progress Tracker{% endblock %}

{% block content %}
<a href="{{ url_for('view_students') }}" class="back-link">← Back to Students</a>

<h1 class="page-title">Update Grade</h1>

<div class="card">
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label>Student ID:</label>
            <input type="text" value="{{ student_id }}" disabled style="background-color: #ecf0f1;">
        </div>

        <div class="form-group">
            <label>Subject:</label>
            <input type="text" value="{{ subject }}" disabled style="background-color: #ecf0f1;">
        </div>

        <div class="form-group">
            <label for="mark">New Mark (0-100):</label>
            <input type="number" id="mark" name="mark" min="0" max="100" step="0.1" value="{{ current_mark }}" required>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="button btn-success">Update Grade</button>
            <a href="{{ url_for('view_student_grades', student_id=student_id) }}" class="button btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
